# Full cloud benchmark: complete datasets (including 11M-row HIGGS), 5 seeds,
# full HPO budgets. Run via notebooks/run_benchmark.ipynb on Colab/cloud.
name: full
budget_profile: full
full_data: true
seeds: [42, 43, 44, 45, 46]
datasets:
  [
    breast_cancer, wine, ionosphere, diabetes, concrete_strength,
    energy_efficiency, phoneme, spambase, adult, california_housing,
    superconductivity, covertype, year_prediction_msd, higgs, susy,
  ]
models: [linear, sgd_linear, random_forest, extra_trees, hist_gb, svm, knn, xgboost, torch_mlp]
modes: [automated, baseline_default, baseline_expert]
